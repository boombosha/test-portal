<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Войти — Mobilon One</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1E6AE1;--purple:#6D28D9;--accent:#436DFF;
  --text:#1C1F26;--mid:#6B7280;--light:#9CA3AF;--xlight:#D1D5DB;
  --border:#E5E7EB;
}
html,body{height:100%;min-height:100vh}
body{
  font-family:'Montserrat',sans-serif;
  background:#E8EBF4;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
}

/* bokeh */
.bokeh{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.blob{position:absolute;border-radius:50%;filter:blur(120px);animation:bp ease-in-out infinite}
@keyframes bp{0%,100%{transform:scale(1)}50%{transform:scale(1.04) translateY(-10px)}}

.page{
  position:relative;z-index:1;
  width:100%;display:flex;align-items:center;justify-content:center;
  padding:40px 20px;min-height:100vh;
}

/* card */
.card{
  width:100%;max-width:860px;
  background:#fff;
  border-radius:16px;
  border:1px solid rgba(0,0,0,.06);
  box-shadow:0 2px 4px rgba(0,0,0,.04),0 16px 48px rgba(0,0,0,.07);
  display:flex;overflow:hidden;min-height:420px;
}

/* left */
.left{
  width:38%;flex-shrink:0;
  padding:52px 44px;
  display:flex;flex-direction:column;
  align-items:flex-start;
  border-right:1px solid var(--border);
  background:#fff;
}
.logo-img{
  height:32px;width:auto;max-width:180px;
  object-fit:contain;object-position:left center;
  display:block;margin-bottom:36px;
}
.left-heading{
  font-size:30px;font-weight:400;
  letter-spacing:-.3px;color:var(--text);
  line-height:1.15;
}
.email-chip{
  display:inline-flex;align-items:center;gap:7px;
  margin-top:14px;padding:5px 12px 5px 6px;
  border:1px solid var(--border);border-radius:999px;
  font-size:12px;font-weight:400;color:var(--mid);
  background:#FAFAFA;
  opacity:0;transition:opacity .3s;pointer-events:none;
}
.email-chip.show{opacity:1;pointer-events:auto}
.chip-av{
  width:22px;height:22px;border-radius:50%;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:600;color:#fff;flex-shrink:0;
}

/* right */
.right{
  flex:1;padding:52px 52px;
  display:flex;flex-direction:column;
  background:#fff;
}

/* progress — 2 lines */
.progress{display:flex;gap:6px;margin-bottom:40px}
.pline{
  height:2px;flex:1;border-radius:2px;background:#E5E7EB;
  transition:background .4s ease;
}
.pline.on{background:linear-gradient(90deg,var(--blue),var(--purple))}

/* step */
.step{display:none;flex-direction:column;flex:1;animation:sIn .26s cubic-bezier(.22,1,.36,1) both}
.step.active{display:flex}
.step.back{animation:sBk .26s cubic-bezier(.22,1,.36,1) both}
@keyframes sIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:none}}
@keyframes sBk{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:none}}

/* input */
.f-input{
  width:100%;padding:15px 16px;
  border:1px solid var(--border);border-radius:8px;
  font-family:'Montserrat',sans-serif;
  font-size:15px;font-weight:300;
  color:var(--text);background:#fff;
  transition:border-color .18s,box-shadow .18s;
  outline:none;margin-bottom:4px;
}
.f-input::placeholder{color:#C0C6D0;font-weight:300}
.f-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(67,109,255,.08)}
.f-input.err{border-color:#EF4444;box-shadow:0 0 0 3px rgba(239,68,68,.06)}
.f-error{font-size:12px;font-weight:400;color:#EF4444;margin-bottom:8px;display:none}

/* password */
.pwd-wrap{position:relative;margin-bottom:4px}
.pwd-wrap .f-input{margin-bottom:0;width:100%}
.pwd-toggle{
  position:absolute;right:13px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;padding:3px;
  color:var(--xlight);transition:color .18s;display:flex;align-items:center;
}
.pwd-toggle:hover{color:var(--light)}

/* forgot */
.forgot-link{
  font-size:12px;font-weight:400;color:var(--accent);
  text-decoration:none;margin-top:8px;display:inline-block;
  transition:opacity .18s;
}
.forgot-link:hover{opacity:.7}

/* spacer */
.spacer{flex:1}

/* action row */
.action-row{
  display:flex;align-items:center;justify-content:flex-end;
  gap:16px;margin-top:28px;
}
.action-row.spread{justify-content:space-between}
.sec-link{
  font-size:14px;font-weight:500;color:var(--accent);
  background:none;border:none;cursor:pointer;padding:0;
  font-family:'Montserrat',sans-serif;transition:opacity .18s;
}
.sec-link:hover{opacity:.7}
.btn-next{
  padding:11px 28px;
  background:var(--accent);
  color:#fff;font-family:'Montserrat',sans-serif;
  font-size:14px;font-weight:500;
  border:none;border-radius:999px;cursor:pointer;
  transition:transform .15s,box-shadow .15s,background .15s;
  box-shadow:0 2px 14px rgba(67,109,255,.22);
  white-space:nowrap;
}
.btn-next:hover{transform:translateY(-1px);box-shadow:0 5px 20px rgba(67,109,255,.32);background:#3860f0}
.btn-next:active{transform:translateY(0)}

@media(max-width:640px){
  .page{padding:0;align-items:flex-start}
  .card{flex-direction:column;border-radius:0;box-shadow:none;border:none;min-height:100vh;min-height:100dvh}
  .left{width:100%;border-right:none;border-bottom:1px solid var(--border);padding:28px 24px 20px}
  .left-heading{font-size:22px}
  .email-chip{display:none}
  .logo-img{height:26px;max-width:150px;margin-bottom:10px}
  .right{padding:28px 24px}
  .f-input{font-size:16px;padding:14px 15px}
  .action-row{margin-top:20px}
}
@media(max-width:380px){
  .left{padding:22px 18px 16px}
  .right{padding:22px 18px}
  .sec-link{font-size:13px}
  .btn-next{font-size:13px;padding:10px 22px}
}
</style>
</head>
<body>

<div class="bokeh" id="bokeh"></div>

<div class="page">
<div class="card">

  <!-- Left -->
  <div class="left">
    <img class="logo-img"
      src="https://optim.tildacdn.com/tild3465-3865-4930-b435-623365366133/-/format/webp/Group_105.png.webp"
      alt="Mobilon One">
    <div class="left-heading" id="leftHeading">Войти</div>
    <div class="email-chip" id="emailChip">
      <div class="chip-av" id="chipAv">A</div>
      <span id="chipText"></span>
    </div>
  </div>

  <!-- Right -->
  <div class="right">

    <div class="progress" id="progressBar">
      <div class="pline on" id="pl1"></div>
      <div class="pline"    id="pl2"></div>
    </div>

    <!-- Step 1: Email -->
    <div class="step active" id="step1">
      <input class="f-input" type="text" id="email"
        placeholder="Адрес электронной почты"
        autocomplete="email" autofocus inputmode="email">
      <div class="f-error" id="emailError">Введите корректный адрес почты</div>

      <div class="spacer"></div>

      <div class="action-row spread">
        <button class="sec-link" onclick="window.location.href='register.html'">Создать аккаунт</button>
        <button class="btn-next" onclick="goStep2()">Далее</button>
      </div>
    </div>

    <!-- Step 2: Password -->
    <div class="step" id="step2">
      <div class="pwd-wrap">
        <input class="f-input" type="password" id="password"
          placeholder="Пароль"
          autocomplete="current-password">
        <button class="pwd-toggle" type="button" onclick="togglePwd('password',this)">
          <svg width="15" height="15" viewBox="0 0 17 17" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 8.5C1 8.5 4 3 8.5 3S16 8.5 16 8.5 13 14 8.5 14 1 8.5 1 8.5z"/>
            <circle cx="8.5" cy="8.5" r="2.5"/>
          </svg>
        </button>
      </div>
      <div class="f-error" id="passwordError">Введите пароль</div>
      <a href="forgot-password.html" class="forgot-link">Забыли пароль?</a>

      <div class="spacer"></div>

      <div class="action-row spread">
        <button class="sec-link" onclick="goBack(1)">Назад</button>
        <button class="btn-next" onclick="doLogin()">Войти</button>
      </div>
    </div>

  </div><!-- /right -->
</div><!-- /card -->
</div><!-- /page -->

<script>
/* Bokeh */
(function(){
  const w=document.getElementById('bokeh');
  [{w:700,h:600,x:0,  y:0,  c:'rgba(96,165,250,.05)', d:20,dl:0},
   {w:800,h:700,x:45, y:20, c:'rgba(139,92,246,.04)', d:24,dl:6},
   {w:600,h:550,x:8,  y:45, c:'rgba(30,106,225,.04)', d:18,dl:3},
   {w:650,h:580,x:55, y:50, c:'rgba(96,165,250,.04)', d:22,dl:9},
   {w:550,h:490,x:70, y:2,  c:'rgba(109,40,217,.035)',d:26,dl:12}
  ].forEach(o=>{
    const el=document.createElement('div');
    el.className='blob';
    el.style.cssText=`width:${o.w}px;height:${o.h}px;left:${o.x}%;top:${o.y}%;background:${o.c};animation-duration:${o.d}s;animation-delay:${o.dl}s`;
    w.appendChild(el);
  });
})();

let cur=1;

function prog(n){
  [1,2].forEach(i=>document.getElementById('pl'+i).className='pline'+(i<=n?' on':''));
}

function show(n,dir){
  const pv=document.getElementById('step'+cur),nx=document.getElementById('step'+n);
  pv.classList.remove('active','back');pv.style.display='none';
  nx.classList.remove('active','back');
  if(dir==='back')nx.classList.add('back');
  nx.style.display='flex';nx.offsetHeight;nx.classList.add('active');
  cur=n;prog(n);
  const h=['Войти','Добро пожаловать!'];
  document.getElementById('leftHeading').textContent=h[n-1]||'';
  document.getElementById('emailChip').classList.toggle('show',n===2);
}

function goBack(t){show(t,'back')}

function goStep2(){
  const v=document.getElementById('email').value.trim();
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)){
    fe('email','emailError',true);return;
  }
  fe('email','emailError',false);
  document.getElementById('chipText').textContent=v;
  document.getElementById('chipAv').textContent=v[0].toUpperCase();
  show(2,'forward');
  setTimeout(()=>document.getElementById('password').focus(),180);
}

function doLogin(){
  const p=document.getElementById('password').value;
  if(!p){fe('password','passwordError',true);return;}
  fe('password','passwordError',false);
  // → redirect to app
  window.location.href='index.html';
}

function fe(inp,eid,s){
  document.getElementById(inp).classList.toggle('err',s);
  document.getElementById(eid).style.display=s?'block':'none';
}

function togglePwd(id,btn){
  const i=document.getElementById(id),s=i.type==='password';
  i.type=s?'text':'password';btn.style.opacity=s?.4:1;
}

document.addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  if(cur===1)goStep2();else if(cur===2)doLogin();
});
['email','password'].forEach(id=>{
  const el=document.getElementById(id);
  if(el)el.addEventListener('input',function(){this.classList.remove('err');});
});
</script>
</body>
</html>
